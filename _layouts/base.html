<!DOCTYPE HTML>
<html lang="en">
  <head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3E7JJ239K6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3E7JJ239K6');
    </script>

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>{% if page.title %}{{ page.title }} – Ethan Foong{% else %}Ethan Foong{% endif %}</title>
    <meta name="author" content="Ethan Foong">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/stylesheet.css">
  </head>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }

    /* ── Nav bar ── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #2a347e;
    }
    .site-nav-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-nav .wordmark {
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
      font-size: 17px;
      font-weight: 700;
      color: #2a347e;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .site-nav .nav-links { display: flex; }
    .site-nav .nav-links a {
      font-size: 13px;
      color: #444;
      text-decoration: none;
      padding: 0 14px;
      height: 48px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      font-family: Arial, sans-serif;
    }
    .site-nav .nav-links a:hover,
    .site-nav .nav-links a.active {
      color: #2a347e;
      border-bottom-color: #2a347e;
    }
  </style>

  <body>
    <nav class="site-nav">
      <div class="site-nav-inner">
        <a href="/" class="wordmark">Ethan Foong</a>
        <div class="nav-links">
          <a href="/" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
          <a href="/projects/" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a>
          <a href="/blog/" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
        </div>
      </div>
    </nav>

    {{ content }}

  </body>
</html>

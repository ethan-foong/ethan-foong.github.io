---
layout: base
---

<style>
  .post-header {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px 0;
  }

  .post-header h1 {
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-size: 28px;
    font-weight: 400;
    color: #111;
    margin: 0 0 8px;
    line-height: 1.3;
  }

  .post-meta {
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }

  /* ── Prose body ── */
  .post-body {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px 40px;
    font-size: 15px;
    line-height: 1.75;
    color: #222;
  }

  .post-body h2 {
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-size: 20px;
    font-weight: 400;
    margin: 36px 0 12px;
    color: #2a347e;
  }

  .post-body h3 {
    font-size: 16px;
    font-weight: 700;
    margin: 28px 0 8px;
  }

  .post-body p { margin: 0 0 16px; }

  .post-body a { color: #1772d0; }

  .post-body code {
    font-size: 13px;
    background: #f4f4f8;
    padding: 2px 5px;
    border-radius: 3px;
  }

  .post-body pre {
    background: #f4f4f8;
    padding: 14px 18px;
    border-radius: 5px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    margin: 0 0 20px;
  }

  .post-body pre code {
    background: none;
    padding: 0;
  }

  .post-body blockquote {
    border-left: 3px solid #2a347e;
    margin: 0 0 16px;
    padding: 4px 0 4px 16px;
    color: #555;
    font-style: italic;
  }

  .post-body img {
    max-width: 100%;
    border-radius: 4px;
    margin: 8px 0 16px;
  }

  .post-body hr {
    border: none;
    border-top: 1px solid #2a347e;
    margin: 32px 0;
  }

  .post-footer {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px 32px;
    font-size: 13px;
    color: #888;
  }
</style>

<div class="post-header">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags %} &nbsp;·&nbsp; {{ page.tags | join: ', ' }}{% endif %}</div>
  <hr style="border:none;border-top:1px solid #2a347e;margin:0 0 24px;">
</div>

<div class="post-body">
  {{ content }}
</div>

<div class="post-footer">
  <a href="/blog/">← All posts</a>
</div>
